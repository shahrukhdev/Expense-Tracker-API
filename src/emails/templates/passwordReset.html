<!DOCTYPE html>
<html>
  <body style="margin:0; padding:0; background-color:#f3f4f6; font-family:Arial, sans-serif;">
    
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding:40px 0;">
          
          <!-- Card -->
          <table width="100%" cellpadding="0" cellspacing="0" style="max-width:420px; background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
            
            <!-- Header -->
            <tr>
              <td style="background:linear-gradient(180deg, #1f2937, #111827); padding:20px; text-align:center;">
                <h2 style="color:#ffffff; margin:0; font-size:20px;">
                  Expense Tracker
                </h2>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding:30px;">
                
                <p style="margin:0 0 15px; color:#111827; font-size:14px;">
                  You requested a password reset.
                </p>

                <p style="margin:0 0 25px; color:#6b7280; font-size:13px;">
                  Click the button below to reset your password.
                </p>

                <!-- Button -->
                <div style="text-align:center; margin-bottom:25px;">
                  <a 
                    href="{{resetUrl}}"
                    style="
                      display:inline-block;
                      background:#111827;
                      color:#ffffff;
                      padding:10px 20px;
                      text-decoration:none;
                      border-radius:6px;
                      font-size:14px;
                      font-weight:500;
                    "
                  >
                    Reset Password
                  </a>
                </div>

                <p style="margin:0; color:#9ca3af; font-size:12px;">
                  If you did not request this, you can safely ignore this email.
                </p>

              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>

  </body>
</html>
